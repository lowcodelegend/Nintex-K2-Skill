{
  "schema_version": 1,
  "case_type": {
    "code": "EVIDENCE_EXCEPTION",
    "name": "Evidence-Driven Exception Review",
    "initial_stage": "CAPTURE",
    "retention_code": "QUALITY_RECORD",
    "configuration_version": "1",
    "ai_enabled": true
  },
  "stages": [
    {"code": "CAPTURE", "workflow": "CM.Stage.Capture", "sequence": 10, "exit_rule": "CAPTURE_COMPLETE", "terminal": false},
    {"code": "VALIDATE", "workflow": "CM.Stage.Validate", "sequence": 20, "exit_rule": "VALIDATION_COMPLETE", "terminal": false},
    {"code": "INVESTIGATE", "workflow": "CM.Stage.Investigate", "sequence": 30, "exit_rule": "EVIDENCE_COMPLETE", "terminal": false},
    {"code": "DECIDE", "workflow": "CM.Stage.Decide", "sequence": 40, "exit_rule": "DECISION_RECORDED", "terminal": false},
    {"code": "CLOSE", "workflow": "CM.Stage.Close", "sequence": 50, "exit_rule": "CLOSURE_COMPLETE", "terminal": true}
  ],
  "transitions": [
    {"from": "CAPTURE", "outcome": "SUBMITTED", "to": "VALIDATE"},
    {"from": "VALIDATE", "outcome": "VALID", "to": "INVESTIGATE"},
    {"from": "VALIDATE", "outcome": "MORE_INFORMATION_REQUIRED", "to": "CAPTURE", "reentry": true},
    {"from": "INVESTIGATE", "outcome": "EVIDENCE_COMPLETE", "to": "DECIDE"},
    {"from": "DECIDE", "outcome": "RETURNED_FOR_INVESTIGATION", "to": "INVESTIGATE", "reentry": true},
    {"from": "DECIDE", "outcome": "APPROVED", "to": "CLOSE"}
  ],
  "extensions": {"entities": [], "notes": "Add solution-specific data; retain the canonical model in case-model.yaml."}
}
